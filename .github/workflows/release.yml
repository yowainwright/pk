name: Release

on:
  workflow_call:
    inputs:
      tag_name:
        description: Existing GitHub release tag to publish
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing GitHub release tag to republish
        required: true
        type: string

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Run tests
        run: go test -race ./...

      - name: Run CLI E2E tests
        run: go test -tags=e2e ./tests/e2e -v

      - name: Run isolated process cleanup E2E
        run: ./tests/e2e/test-process-cleanup.sh

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build binaries
        env:
          VERSION: ${{ inputs.tag_name }}
        run: |
          mkdir -p bin
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=$VERSION" -o bin/pk-darwin-arm64 ./cmd/pk
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=$VERSION" -o bin/pk-darwin-amd64 ./cmd/pk
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=$VERSION" -o bin/pk-linux-arm64 ./cmd/pk
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w -X main.version=$VERSION" -o bin/pk-linux-amd64 ./cmd/pk

      - name: Create checksums
        working-directory: bin
        run: sha256sum pk-* > SHA256SUMS

      - name: Verify binary version
        env:
          VERSION: ${{ inputs.tag_name }}
        run: test "$(./bin/pk-linux-amd64 --version)" = "pk $VERSION"

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.tag_name }}
        run: gh release upload "$VERSION" bin/* --clobber

  update-homebrew:
    name: Update Homebrew
    needs: build
    uses: ./.github/workflows/update-homebrew.yml
    with:
      tag_name: ${{ inputs.tag_name }}
    secrets:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
