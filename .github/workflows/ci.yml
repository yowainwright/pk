name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2

      - name: Build custom linter
        run: golangci-lint custom

      - name: Lint
        run: ./bin/legibility-golangci-lint run ./...

      - name: Format
        run: ./bin/legibility-golangci-lint fmt --diff ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
