name: Update Homebrew Formula

on:
  workflow_call:
    inputs:
      tag_name:
        description: GitHub release tag containing pk binaries
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true
  workflow_dispatch:
    inputs:
      tag_name:
        description: GitHub release tag containing pk binaries
        required: true
        type: string

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout homebrew-tap repo
        uses: actions/checkout@v4
        with:
          repository: yowainwright/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Get release info
        id: release
        env:
          TAG: ${{ inputs.tag_name }}
        run: |
          VERSION="$TAG"
          VERSION="${VERSION#v}"
          {
            echo "version=$VERSION"
            echo "tag=$TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Download release assets and calculate SHA256
        id: checksums
        run: |
          VERSION="${{ steps.release.outputs.tag }}"
          REPO="yowainwright/pk"

          curl --fail --location --show-error --silent -o pk-darwin-arm64 "https://github.com/$REPO/releases/download/$VERSION/pk-darwin-arm64"
          SHA_DARWIN_ARM64=$(sha256sum pk-darwin-arm64 | cut -d' ' -f1)

          curl --fail --location --show-error --silent -o pk-darwin-amd64 "https://github.com/$REPO/releases/download/$VERSION/pk-darwin-amd64"
          SHA_DARWIN_AMD64=$(sha256sum pk-darwin-amd64 | cut -d' ' -f1)

          curl --fail --location --show-error --silent -o pk-linux-arm64 "https://github.com/$REPO/releases/download/$VERSION/pk-linux-arm64"
          SHA_LINUX_ARM64=$(sha256sum pk-linux-arm64 | cut -d' ' -f1)

          curl --fail --location --show-error --silent -o pk-linux-amd64 "https://github.com/$REPO/releases/download/$VERSION/pk-linux-amd64"
          SHA_LINUX_AMD64=$(sha256sum pk-linux-amd64 | cut -d' ' -f1)

          {
            echo "sha_darwin_arm64=$SHA_DARWIN_ARM64"
            echo "sha_darwin_amd64=$SHA_DARWIN_AMD64"
            echo "sha_linux_arm64=$SHA_LINUX_ARM64"
            echo "sha_linux_amd64=$SHA_LINUX_AMD64"
          } >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: |
          mkdir -p Formula
          cat > Formula/pk.rb << 'FORMULA'
          class Pk < Formula
            desc "Safe-by-default local development process cleanup"
            homepage "https://github.com/yowainwright/pk"
            version "${{ steps.release.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/yowainwright/pk/releases/download/${{ steps.release.outputs.tag }}/pk-darwin-arm64"
                sha256 "${{ steps.checksums.outputs.sha_darwin_arm64 }}"
              else
                url "https://github.com/yowainwright/pk/releases/download/${{ steps.release.outputs.tag }}/pk-darwin-amd64"
                sha256 "${{ steps.checksums.outputs.sha_darwin_amd64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/yowainwright/pk/releases/download/${{ steps.release.outputs.tag }}/pk-linux-arm64"
                sha256 "${{ steps.checksums.outputs.sha_linux_arm64 }}"
              else
                url "https://github.com/yowainwright/pk/releases/download/${{ steps.release.outputs.tag }}/pk-linux-amd64"
                sha256 "${{ steps.checksums.outputs.sha_linux_amd64 }}"
              end
            end

            def install
              bin.install Dir["pk-*"].first => "pk"
            end

            test do
              assert_match "pk", shell_output("#{bin}/pk --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/pk.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Update pk to ${{ steps.release.outputs.version }}"
          git push
